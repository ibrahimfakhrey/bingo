<body class="text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Bar (Manual Construction as per Task Logic - Shell Suppressed for Transactions) -->
<header class="w-full top-0 sticky bg-[#ffffff] px-6 py-6 flex items-center justify-between z-10">
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-low rounded-full hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<h1 class="jakarta font-bold text-xl text-on-surface text-center flex-1">Enroll Your Child 🎉</h1>
<div class="w-12"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 px-6 pb-32">
<!-- Step Progress Indicator -->
<div class="flex items-center justify-between py-6 max-w-xs mx-auto">
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-on-primary font-bold shadow-[0px_8px_16px_rgba(156,63,0,0.2)]">1</div>
<span class="text-[10px] font-bold text-primary jakarta">Child Info</span>
</div>
<div class="h-[2px] flex-1 bg-surface-container mx-2 mb-6"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant font-bold">2</div>
<span class="text-[10px] font-semibold text-on-surface-variant jakarta">Program</span>
</div>
<div class="h-[2px] flex-1 bg-surface-container mx-2 mb-6"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant font-bold">3</div>
<span class="text-[10px] font-semibold text-on-surface-variant jakarta">Confirm</span>
</div>
</div>
<!-- Section Header -->
<div class="mb-8">
<h2 class="jakarta font-extrabold text-2xl mb-1 text-primary-dim">Step 1: Tell us about your child</h2>
<p class="text-on-surface-variant text-sm italic">Your progress is saved automatically.</p>
</div>
<!-- Form Fields -->
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="jakarta font-bold text-sm text-on-surface flex items-center gap-1">
                    Child's Full Name <span class="text-error">*</span>
</label>
<input class="w-full bg-surface-container-low border-none rounded-[12px] px-4 py-4 focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none text-on-surface placeholder:text-outline-variant" placeholder="Pingoo Penguin Jr." type="text"/>
</div>
<!-- DOB -->
<div class="space-y-2">
<label class="jakarta font-bold text-sm text-on-surface flex items-center gap-1">
                    Date of Birth <span class="text-error">*</span>
</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-[12px] px-4 py-4 focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none text-on-surface appearance-none" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary pointer-events-none">calendar_month</span>
</div>
</div>
<!-- Gender Toggle -->
<div class="space-y-2">
<label class="jakarta font-bold text-sm text-on-surface flex items-center gap-1">
                    Gender <span class="text-error">*</span>
</label>
<div class="flex gap-4">
<button class="flex-1 flex items-center justify-center gap-2 py-4 rounded-full bg-primary text-on-primary font-bold shadow-lg shadow-primary/10 transition-transform active:scale-95" type="button">
<span class="text-xl">👦</span>
<span>Boy</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 py-4 rounded-full bg-surface-container-low text-on-surface-variant font-bold hover:bg-surface-container transition-transform active:scale-95" type="button">
<span class="text-xl">👧</span>
<span>Girl</span>
</button>
</div>
</div>
<!-- Upload Photo -->
<div class="space-y-2">
<label class="jakarta font-bold text-sm text-on-surface flex items-center gap-1">
                    Upload Child Photo
                </label>
<div class="w-full h-40 border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center bg-surface-container-low hover:bg-surface-container-high transition-colors cursor-pointer overflow-hidden group">
<div class="flex flex-col items-center gap-2 group-hover:scale-105 transition-transform">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
<span class="jakarta font-bold text-sm text-primary">Tap to upload</span>
</div>
</div>
</div>
<!-- Special Needs -->
<div class="space-y-2">
<label class="jakarta font-bold text-sm text-on-surface flex items-center gap-1">
                    Any Special Needs or Notes
                </label>
<textarea class="w-full bg-surface-container-low border-none rounded-[12px] px-4 py-4 focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none text-on-surface placeholder:text-outline-variant resize-none" placeholder="Tell us anything we should know to make your child's experience wonderful..." rows="4"></textarea>
</div>
</form>

<span class="material-symbols-outlined">arrow_forward</span>

<div class="bg-surface/80 backdrop-blur-md px-4 py-3 rounded-2xl rounded-br-none shadow-xl border border-white/50 text-xs font-semibold text-primary max-w-[140px] jakarta">
