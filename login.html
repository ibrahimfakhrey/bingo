<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-transparent focus:border-primary/20 focus:ring-0 rounded-[12px] transition-all font-body placeholder:text-outline-variant" placeholder="Enter your contact" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-on-surface-variant ml-1">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-surface-container-low border-transparent focus:border-primary/20 focus:ring-0 rounded-[12px] transition-all font-body placeholder:text-outline-variant" placeholder="Enter your password" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="text-sm font-bold text-primary hover:text-primary-dim transition-colors" href="#">Forgot Password?</a>
</div>
</div>
