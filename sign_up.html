</div>
</div>
<!-- Phone Number -->
<div class="space-y-1.5">
<label class="text-sm font-bold text-on-surface ml-1 uppercase tracking-wider">Phone Number</label>
<div class="flex gap-2">
<div class="flex items-center gap-2 px-3 bg-surface-container-low rounded-xl cursor-pointer hover:bg-surface-container-highest transition-colors">

</div>
</div>
<!-- Email -->

</div>
</div>

<label class="text-sm font-bold text-on-surface ml-1 uppercase tracking-wider">Password</label>
<div class="relative">
