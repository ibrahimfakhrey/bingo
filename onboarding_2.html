<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center overflow-hidden">
<!-- Top Navigation / Skip -->
<header class="w-full flex justify-end items-center px-8 py-6">
<button class="text-primary-container font-headline font-bold text-lg hover:scale-105 transition-transform">
            Skip

</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md flex flex-col items-center justify-center px-8 relative">

<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[60%] bg-surface-container-low rounded-[100%] opacity-50 blur-3xl -z-10"></div>

<div class="relative w-full aspect-square mb-12 group">

<div class="absolute top-4 -right-2 z-20 bg-surface/80 backdrop-blur-xl border border-white/40 p-4 rounded-2xl shadow-xl flex items-center gap-3 animate-bounce shadow-[0px_12px_32px_rgba(156,63,0,0.06)]">

<span class="material-symbols-outlined text-on-tertiary-container" data-icon="sentiment_very_satisfied">sentiment_very_satisfied</span>
</div>
<div>
<p class="text-[10px] font-headline font-bold text-on-surface-variant uppercase tracking-wider">New Update</p>
<p class="text-sm font-headline font-bold text-on-surface">Weekly Report Ready!</p>
</div>
</div>
<!-- Main Image Container -->
<div class="w-full h-full rounded-xl overflow-hidden relative">
<img alt="Happy parent looking at mobile phone" class="w-full h-full object-cover rounded-xl" data-alt="A warm, brightly lit portrait of a joyful mother smiling at her smartphone with soft sun flare in a cozy home setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_oZtJMTobrUN55B37LzadhH6vcvKAca_A-15JQSjWlSK4XEwPrEytKJTEIoVvsjuXmgbfmTDlEZmrPc7QBj8MNFoA51rV3B4dtc4oBdbVmP-EVkaXkD3_IGlxNUtMbukQBddHKDhkFLhSwTIDLGOq0dph-77hYaofntnE4MCwoVGBDEY59yBxmRBGW_VaJn7DtZmTspNT7ZnAIKnRA4lJoDuHxY73gB2K7GR8RGfGtCUtnhzyyVEc0KM19noSnTCNevEUAzKk8yo"/>
<!-- Overlay Texture for High-End feel -->
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent opacity-40"></div>
</div>
<!-- Floating Chat Bubble (Brand Icon) -->
<div class="absolute bottom-6 -left-4 z-20 bg-secondary text-on-secondary px-4 py-3 rounded-2xl rounded-bl-none shadow-xl flex items-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="forum">forum</span>
<span class="text-xs font-headline font-bold">Chat with Teachers</span>
</div>
</div>
<!-- Text Content Area -->
<div class="text-center mb-12">
<h1 class="font-fredoka text-3xl md:text-4xl text-[#312e2b] mb-4 leading-tight tracking-tight">
                Stay Connected Every Day 📱
            </h1>
<p class="font-body text-lg text-on-surface-variant leading-relaxed px-2">
                Track your child's progress, get daily reports, and chat with teachers — all in one place.
            </p>
</div>
<!-- Page Indicator Dots -->
<div class="flex gap-3 mb-10">
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
<div class="w-8 h-2.5 rounded-full bg-primary-container transition-all duration-300"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
</div>

<footer class="w-full max-w-md px-8 pb-12 flex flex-col items-center">
